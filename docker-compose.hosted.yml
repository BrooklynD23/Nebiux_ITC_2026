services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      UVICORN_RELOAD: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./dataset/itc2026_ai_corpus:/app/dataset/itc2026_ai_corpus:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        VITE_USE_MOCK: "false"
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
